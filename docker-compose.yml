services:
  mongo:
    image: mongo:7
    container_name: local-mongo
    restart: unless-stopped
    env_file:
      - ./apps/auth/.env
    ports:
      - '${MONGO_PORT}:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  reservations:
    build:
      context: .
      dockerfile: ./apps/reservations/Dockerfile
    env_file:
      - ./apps/reservations/.env
    environment:
      MONGO_HOST: mongo
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      mongo:
        condition: service_healthy
      auth:
        condition: service_started
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: ./apps/auth/Dockerfile
    env_file:
      - ./apps/auth/.env
    environment:
      MONGO_HOST: mongo
    ports:
      - '${HTTP_PORT}:${HTTP_PORT}'
      - '${TCP_PORT}:${TCP_PORT}'
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
  
  payments:
    build:
      context: .
      dockerfile: ./apps/payments/Dockerfile
    env_file:
      - ./apps/payments/.env
    environment:
      MONGO_HOST: mongo
    ports:
      - '${PAYMENTS_PORT}:${PAYMENTS_PORT}'
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  notifications:
    build:
      context: .
      dockerfile: ./apps/notifications/Dockerfile
    env_file:
      - ./apps/notifications/.env
    environment:
      MONGO_HOST: mongo
    ports:
      - '${NOTIFICATIONS_PORT}:${NOTIFICATIONS_PORT}'
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mongo_data:
